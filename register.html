<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
      /* Sidebar full height on medium+ screens */
      @media (min-width: 768px) {
        .sidebar {
          min-height: 100vh;
        }
      }
    </style>
</head>
<body>

<!-- Header bar -->
<header class="top-header d-flex justify-content-between p-2 bg-light">
    <div class="left">BVRITH E-BOOK SYSTEM</div>
    <div class="right">Welcome, Hasini | Roll No: 24WH1A0576</div>
</header>

<div class="container-fluid">
  <div class="row flex-column flex-md-row">

    <!-- Sidebar -->
    <aside class="sidebar col-12 col-md-3 bg-light p-3 mb-3 mb-md-0">
      <a href="register.html" class="d-block mb-2">Registration</a>
      <a href="login.html" class="d-block">Login</a>
    </aside>

    <!-- Main content -->
    <main class="col-12 col-md-9 d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
      <div class="card p-3" style="max-width: 600px; width: 100%;">

        <h2 class="text-center">Create Account</h2>
        <br>

        <form class="form-grid" onsubmit="event.preventDefault(); window.location.href='catalog.html';">

          <div class="mb-3">
            <label>Full Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="login-link mb-3 text-center">
            Already have an account? <a href="login.html">Login here</a>
          </div>
          
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" class="form-control" required>
          </div>

          <div class="gender-field mb-3">
            <label>Gender</label>
            <div class="d-flex gap-3">
              <label><input type="radio" name="gender"> Male</label>
              <label><input type="radio" name="gender"> Female</label>
            </div>
          </div>

          <div class="mb-3">
            <label>Department</label>
            <select class="form-select">
              <option>CSE</option>
              <option>AIML</option>
              <option>ECE</option>
              <option>EEE</option>
              <option>IT</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Address</label>
            <textarea class="form-control" rows="3"></textarea>
          </div>

          <div class="mb-3 d-flex gap-2">
            <button class="primary-btn btn">Submit</button>
            <button type="reset" class="btn">Clear</button>
          </div>

        </form>
      </div>
    </main>
  </div>
</div>

<!-- Footer -->
<footer class="text-center py-3 bg-light mt-3">
    2026 BVRITH. All rights reserved.
</footer>

</body>
</html>
