<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
      /* Sidebar full height on medium+ screens */
      @media (min-width: 768px) {
        .sidebar {
          min-height: 100vh;
        }
      }
    </style>
</head>

<body>

<header class="top-header d-flex justify-content-between p-2 bg-light">
    <div class="left">BVRITH E-BOOK SYSTEM</div>
    <div class="right">Welcome, Hasini | Roll No: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row flex-column flex-md-row">

        <!-- Sidebar -->
        <aside class="sidebar col-12 col-md-3 bg-light p-3 mb-3 mb-md-0">
            <a href="register.html" class="d-block mb-2">Register</a>
            <a href="login.html" class="d-block">Login</a>
        </aside>

        <!-- Main content -->
        <main class="col-12 col-md-9 d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
            <div class="card p-3" style="max-width: 400px; width: 100%;">

                <h2 class="text-center">Login</h2>

                <form action="catalog.html" class="mt-3">

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <button class="primary-btn btn w-100">Login</button>

                </form>

                <div class="login-link mt-3 text-center">
                    Don't have an account?
                    <a href="register.html">Register</a>
                </div>

            </div>
        </main>

    </div>
</div>

<footer class="text-center py-3 bg-light mt-3">
    2026 BVRITH
</footer>

</body>
</html>
