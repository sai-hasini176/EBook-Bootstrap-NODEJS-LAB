<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Sidebar full height on medium+ screens */
        @media (min-width: 768px) {
            .sidebar {
                min-height: 100vh;
            }
        }

        /* Make tables responsive */
        .cart-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 8px;
            text-align: left;
        }
    </style>
</head>

<body>

<header class="top-header d-flex justify-content-between p-2 bg-light">
    <div class="left">BVRITH E-BOOK SYSTEM</div>
    <div class="right">Welcome, Hasini | Roll No.: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row flex-column flex-md-row">

        <!-- Sidebar -->
        <aside class="sidebar col-12 col-md-3 bg-light p-3 mb-3 mb-md-0">
            <a href="catalog.html" class="d-block mb-2">Catalog</a>
            <a href="cart.html" class="d-block mb-2 active">Cart</a>
            <a href="logout.html" class="d-block">Logout</a>
        </aside>

        <!-- Main Content -->
        <main class="col-12 col-md-9 d-flex justify-content-center align-items-start">
            <div class="card p-3" style="max-width: 600px; width: 100%; margin-top: 20px; margin-bottom: 20px;">

                <h2 class="text-center">Shopping Cart</h2>

                <div class="cart-table-wrapper mt-3">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Price</th>
                                <th>Total</th>
                                <th>Remove</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Product 1</td>
                                <td>2</td>
                                <td>Rs.150</td>
                                <td>Rs.300</td>
                                <td>
                                    <button class="danger-btn btn btn-sm">Remove</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <h3 class="text-end mt-3">Total: Rs. 300</h3>

                <div class="text-end mt-2">
                    <a href="#bill" class="primary-btn btn">Proceed to Checkout</a>
                </div>

            </div>
        </main>

    </div>
</div>

<!-- Floating Bill Popup -->
<div id="bill" class="bill-overlay">
    <div class="bill-popup card p-3 mx-2 my-3" style="max-width: 600px; margin:auto;">

        <h2 class="text-center">Purchase Bill</h2>

        <div class="cart-table-wrapper mt-3">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Product 1</td>
                        <td>2</td>
                        <td>Rs.300</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <h3 class="text-end mt-3">Grand Total: Rs.300</h3>

        <div class="text-end mt-2">
            <a href="#" class="primary-btn btn">Close</a>
        </div>
    </div>
</div>

<footer class="text-center py-3 bg-light mt-3">
    2026 BVRITH
</footer>

</body>
</html>
