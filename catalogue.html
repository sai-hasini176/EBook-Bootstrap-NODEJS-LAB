<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Sidebar full height on medium+ screens */
        @media (min-width: 768px) {
            .sidebar {
                min-height: 100vh;
            }
        }

        /* Keep product images uniform */
        .product-card img {
            max-height: 150px;
            object-fit: contain;
        }

        /* Ensure product cards fill available space evenly */
        .product-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
    </style>
</head>

<body>

<header class="top-header d-flex justify-content-between p-2 bg-light">
    <div class="left">BVRITH E-BOOK SYSTEM</div>
    <div class="right">Welcome, Hasini | Roll No.: 24WH1A0576</div>
</header>

<div class="container-fluid">
    <div class="row flex-column flex-md-row">

        <!-- Sidebar -->
        <aside class="sidebar col-12 col-md-3 bg-light p-3 mb-3 mb-md-0">
            <a href="catalog.html" class="d-block mb-2">Catalog</a>
            <a href="cart.html" class="d-block mb-2">Cart</a>
            <a href="logout.html" class="d-block">Logout</a>
        </aside>

        <!-- Main content -->
        <main class="col-12 col-md-9 d-flex justify-content-center align-items-start"
            style="min-height: calc(100vh - 56px);">
            <div class="card p-3" style="max-width: 600px; width: 100%;">

                <h2 class="text-center">Product Catalog</h2>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3 mt-3">

                    <div class="col d-flex">
                        <div class="product-card text-center p-2 border w-100">
                            <img src="images/book1.jpg" class="img-fluid mb-2">
                            <h4>Product 1</h4>
                            <p>Rs. 150</p>
                            <a href="cart.html" class="primary-btn btn w-100 mt-auto">Add to Cart</a>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="product-card text-center p-2 border w-100">
                            <img src="images/book2.jpg" class="img-fluid mb-2">
                            <h4>Product 2</h4>
                            <p>Rs. 300</p>
                            <a href="cart.html" class="primary-btn btn w-100 mt-auto">Add to Cart</a>
                        </div>
                    </div>

                    <div class="col d-flex">
                        <div class="product-card text-center p-2 border w-100">
                            <img src="images/book3.jpg" class="img-fluid mb-2">
                            <h4>Product 3</h4>
                            <p>Rs. 250</p>
                            <a href="cart.html" class="primary-btn btn w-100 mt-auto">Add to Cart</a>
                        </div>
                    </div>

                </div>
            </div>
        </main>

    </div>
</div>

<footer class="text-center py-3 bg-light mt-3">
    2026 BVRITH
</footer>

</body>
</html>
